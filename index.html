<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #ff4500;
            font-family: monospace;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #heart-container {
            white-space: pre;
            font-size: 10px;
            line-height: 10px;
            text-shadow: 0 0 6px #ff4500, 0 0 15px #ff0000;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

<script>
    const container = document.getElementById('heart-container');
    const textStr = "  I LOVE YOU ";
    
    const width = 60;
    const height = 24;

    // Ճիշտ ու լայն սրտի ձևի բանաձևը (ինչպես վիդեոյում է)
    function isHeartEdge(x, y) {
        let nx = (x - width / 2) / (width / 2.3);
        let ny = -(y - height / 2.2) / (height / 1.8);
        
        let f = Math.pow(nx*nx + ny*ny - 1, 3) - nx*nx * ny*ny*ny;
        return f <= 0 && f >= -0.3; // Վերցնում է միայն բարակ եզրագիծը
    }

    // Հավաքում ենք սրտի բոլոր կետերը հերթականությամբ
    let edgePoints = [];
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
            if (isHeartEdge(x, y)) {
                let angle = Math.atan2(y - height/2, x - width/2);
                edgePoints.push({x, y, angle});
            }
        }
    }

    // Դասավորում ենք ըստ անկյան, որ տառերը շրջանաձև հաջորդեն իրար
    edgePoints.sort((a, b) => a.angle - b.angle);

    let offset = 0;

    function drawHeart() {
        let grid = [];
        for (let y = 0; y < height; y++) {
            grid[y] = [];
            for (let x = 0; x < width; x++) grid[y][x] = " ";
        }

        // Տեքստը պտտում ենք offset-ի շնորհիվ (վազող տողի էֆեկտ)
        edgePoints.forEach((p, index) => {
            let charIndex = (index + offset) % textStr.length;
            grid[p.y][p.x] = textStr[charIndex];
        });

        let htmlOutput = "";
        for (let y = 0; y < height; y++) {
            htmlOutput += grid[y].join("") + "\n";
        }
        container.innerHTML = htmlOutput;
        
        offset = (offset + 1) % textStr.length;
    }

    // Անիմացիայի արագությունը (որքան փոքր է թիվը, այնքան արագ կպտտվի)
    setInterval(drawHeart, 150);
</script>
</body>
</html>
