<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const textStr = "I LOVE YOU   ";
    let offset = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2; 
        const size = Math.min(canvas.width, canvas.height) * 0.4; 

        ctx.font = "bold 14px monospace";
        ctx.fillStyle = "#ff4500";
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = 10;

        let totalPoints = 90; 
        
        for (let i = 0; i < totalPoints; i++) {
            let t = (i / totalPoints) * Math.PI * 2 + offset;
            
            // Standard heart math drawing curves right-side up
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

            let posX = centerX + x * (size / 30);
            let posY = centerY + y * (size / 30);

            let charIdx = i % textStr.length;
            ctx.fillText(textStr[charIdx], posX, posY);
        }

        // Controls rotation speed
        offset -= 0.02; 
        
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
