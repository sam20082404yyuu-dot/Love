<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Կատարյալ, անփոփոխ սրտի կառուցվածքը */
        .heart-wrapper {
            position: relative;
            width: 260px;
            height: 260px;
        }

        /* Սրտի երկու կլոր թևերը և տակը */
        .heart-block {
            position: absolute;
            width: 160px;
            height: 240px;
            /* Իսկական վառ նեոնային նարնջագույն-կարմիր գույնը */
            border: 3.5px dashed #ff4500;
            border-bottom: none;
            border-radius: 160px 160px 0 0;
            box-shadow: 0 0 10px #ff0000, inset 0 0 10px #ff0000;
        }

        .left-side {
            left: 0;
            transform: rotate(-45deg);
            transform-origin: 100% 100%;
        }

        .right-side {
            right: 0;
            transform: rotate(45deg);
            transform-origin: 0 100%;
        }

        /* Կենտրոնի տեքստը՝ «I LOVE YOU», որը սահուն պտտվում է */
        .center-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 40%;
            font-family: monospace;
            font-size: 16px;
            font-weight: bold;
            color: #ff4500;
            text-shadow: 0 0 8px #ff0000, 0 0 20px #ff4500;
            animation: textPulse 1.5s infinite ease-in-out;
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 15px #ff0000, 0 0 30px #ff4500; }
        }
    </style>
</head>
<body>

    <div class="heart-wrapper">
        <div class="heart-block left-side"></div>
        <div class="heart-block right-side"></div>
        <div class="center-text">I LOVE YOU</div>
    </div>

</body>
</html>
