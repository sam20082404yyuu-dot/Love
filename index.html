<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #ff4500;
            font-family: monospace;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #heart-container {
            white-space: pre;
            font-size: 11px;
            line-height: 10px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #ff4500, 0 0 20px #ff0000;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

<script>
    const container = document.getElementById('heart-container');
    const textStr = "I LOVE YOU ";
    
    // Կատարյալ կլորացված սրտի ձևանմուշ (template)
    const heartTemplate = [
        "      I LOVE YOU         I LOVE YOU      ",
        "    I            LO   VE            I    ",
        "  I                O                 I  ",
        " I                                    I ",
        "I                                      I",
        "I                                      I",
        " I                                    I ",
        "  I                                  I  ",
        "   I                                I   ",
        "    I                              I    ",
        "      I                          I      ",
        "        I                      I        ",
        "          I                  I          ",
        "            I              I            ",
        "              I          I              ",
        "                I      I                ",
        "                  I  I                  ",
        "                   I                    "
    ];

    const height = heartTemplate.length;
    const width = heartTemplate[0].length;
    let offset = 0;

    function drawHeart() {
        let outputRows = [];
        let charIndex = offset;

        for (let y = 0; y < height; y++) {
            let rowStr = "";
            for (let x = 0; x < width; x++) {
                // Եթե տվյալ կետում template-ի մեջ դատարկ տարածություն չէ, ուրեմն սրտի եզրագիծն է
                if (heartTemplate[y][x] !== " ") {
                    rowStr += textStr[charIndex % textStr.length];
                    charIndex++;
                } else {
                    rowStr += " ";
                }
            }
            outputRows.push(rowStr);
        }

        container.innerHTML = outputRows.join("\n");
        // Անիմացիայի արագության (սահելու) քայլը
        offset = (offset + 1) % textStr.length;
    }

    // Պտտվելու արագությունը (140 միլիվայրկյան)
    setInterval(drawHeart, 140);
</script>
</body>
</html>
