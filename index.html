<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #ff2a2a;
            font-family: monospace;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #heart-container {
            white-space: pre;
            font-size: 8px;
            line-height: 8px;
            text-shadow: 0 0 10px rgba(255, 42, 42, 0.8);
        }

        /* Տառերի հայտնվելու էֆեկտը՝ ձախից աջ */
        .char {
            display: inline-block;
            opacity: 0;
            transform: scale(0);
            transition: opacity 0.1s ease, transform 0.1s ease;
        }

        .char.visible {
            opacity: 1;
            transform: scale(1);
        }

        /* Բաբախելու/Թարթելու էֆեկտը */
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(255, 42, 42, 0.8); }
            50% { transform: scale(1.05); text-shadow: 0 0 25px rgba(255, 42, 42, 1); }
            100% { transform: scale(1); text-shadow: 0 0 10px rgba(255, 42, 42, 0.8); }
        }

        .beating {
            animation: pulse 1.2s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <div id="heart-container"></div>

<script>
    const container = document.getElementById('heart-container');
    const textStr = "I LOVE YOU ";
    let charIdx = 0;
    let htmlOutput = "";

    // Քո ուզած սրտի ձևը՝ վեբի համար
    for (let y = 13; y >= -13; y--) {
        let rowHtml = "";
        for (let x = -27; x <= 27; x++) {
            let f_x = x * 0.045;
            let f_y = y * 0.11;
            
            if (Math.pow(f_x*f_x + f_y*f_y - 1, 3) - f_x*f_x * Math.pow(f_y, 3) <= 0) {
                let char = textStr[charIdx % textStr.length];
                rowHtml += `<span class="char">${char}</span>`;
                charIdx++;
            } else {
                rowHtml += " ";
            }
        }
        htmlOutput += rowHtml + "\n";
    }

    container.innerHTML = htmlOutput;

    // Անիմացիան՝ տառերը հերթով բացվում են ձախից աջ
    const chars = document.querySelectorAll('.char');
    chars.forEach((char, index) => {
        setTimeout(() => {
            char.classList.add('visible');
            
            // Երբ ամենավերջին տառը բացվի, միանում է թարթելը
            if (index === chars.length - 1) {
                setTimeout(() => {
                    container.classList.add('beating');
                }, 200);
            }
        }, index * 3); // 3 միլիվայրկյան ամեն տառի համար
});
</script>
</body>
</html>
