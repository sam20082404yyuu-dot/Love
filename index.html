<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        svg {
            width: 90vw;
            max-width: 450px;
            height: auto;
        }

        text {
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            fill: #ff4500;
            /* Նեոնային վառ կարմիր փայլ */
            filter: drop-shadow(0px 0px 6px #ff0000) drop-shadow(0px 0px 15px #ff4500);
        }
    </style>
</head>
<body>

    <svg viewBox="0 0 300 300">
        <path id="heartPath" d="M 150,90 
                 C 150,20 60,20 60,90 
                 C 60,160 150,230 150,250 
                 C 150,230 240,160 240,90 
                 C 240,20 150,20 150,90 Z" 
              fill="none" />
        
        <text>
            <textPath id="heartTextPath" href="#heartPath" startOffset="0%">
                I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU 
            </textPath>
        </text>
    </svg>

<script>
    const textPath = document.getElementById('heartTextPath');
    let offset = 0;

    function animateHeart() {
        // Տեքստը սահուն առաջ է գնում գծի երկայնքով
        offset -= 0.4;
        textPath.setAttribute('startOffset', offset + '%');
        requestAnimationFrame(animateHeart);
    }

    animateHeart();
</script>
</body>
</html>
