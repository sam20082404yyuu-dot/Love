<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    // Էկրանի չափսերին հարմարեցում
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const textStr = "I LOVE YOU   ";
    let offset = 0;

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Կենտրոնը և սրտի չափսը՝ կախված էկրանից
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2 + 30;
        const size = Math.min(canvas.width, canvas.height) * 0.45; 

        ctx.font = "bold 13px monospace";
        // Նեոնային վառ նարնջագույն-կարմիր փայլը
        ctx.fillStyle = "#ff4500";
        ctx.shadowColor = "#ff0000";
        ctx.shadowBlur = 12;

        let totalPoints = 120; // Քանի տառ լինի սրտի վրա
        
        for (let i = 0; i < totalPoints; i++) {
            // Պտույտի էֆեկտը offset-ի միջոցով
            let t = (i / totalPoints) * Math.PI * 2 + offset;
            
            // Մաթեմատիկական կատարյալ, լայն սրտի բանաձևը (ինչպես քո առաջին վիդեոյում էր)
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

            // Մասշտաբավորում և տեղադրում կենտրոնում
            let posX = centerX + x * (size / 28);
            let posY = centerY + y * (size / 28);

            // Գտնում ենք տառի ինդեքսը
            let charIdx = i % textStr.length;
            
            ctx.fillText(textStr[charIdx], posX, posY);
        }

        // Պտտվելու արագությունը
        offset -= 0.015; 
        
        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
